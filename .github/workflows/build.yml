name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    name: Build (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        run: pyinstaller survey_generator.spec --noconfirm

      - name: Zip app bundle
        run: |
          cd dist
          zip -r "../Survey-Generator-macOS-arm64.zip" "Survey Generator.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Survey-Generator-macOS-arm64
          path: Survey-Generator-macOS-arm64.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Survey-Generator-macOS-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Survey-Generator-macOS-arm64.zip
          generate_release_notes: true
