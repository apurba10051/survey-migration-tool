name: Build macOS App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            target_arch: arm64
          - arch: x86_64
            target_arch: x86_64

    # Both jobs run on macos-14 (arm64 runner) — fast to pick up.
    # PyInstaller cross-compiles x86_64 via target_arch in the spec.
    runs-on: macos-14
    name: Build (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build app
        env:
          TARGET_ARCH: ${{ matrix.target_arch }}
        run: |
          # Patch spec target_arch at build time so both jobs run on arm64 runner
          sed -i '' "s/target_arch=None/target_arch='${TARGET_ARCH}'/" survey_generator.spec
          pyinstaller survey_generator.spec --noconfirm

      - name: Zip app bundle
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          cd dist
          zip -r "../Survey-Generator-macOS-${ARCH}.zip" "Survey Generator.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Survey-Generator-macOS-${{ matrix.arch }}
          path: Survey-Generator-macOS-${{ matrix.arch }}.zip
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: Survey-Generator-macOS-arm64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: Survey-Generator-macOS-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Survey-Generator-macOS-arm64.zip
            Survey-Generator-macOS-x86_64.zip
          generate_release_notes: true
